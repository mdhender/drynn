# /etc/nginx/sites-available/drynn
#
# Nginx reverse-proxy configuration for drynn.
# Replace "hobo.example.com" with your actual domain before installing.

# HTTP — redirect to HTTPS. Certbot manages the ACME challenge location.
server {
    listen 80;
    listen [::]:80;
    server_name hobo.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to the Go application on loopback.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hobo.example.com;

    # Certbot populates these paths after the first certificate issuance.
    ssl_certificate     /etc/letsencrypt/live/hobo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hobo.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request body limit — bump if you add upload features.
    client_max_body_size 2m;

    # Gzip.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/drynn.access.log;
    error_log  /var/log/nginx/drynn.error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        proxy_buffering on;
    }
}
